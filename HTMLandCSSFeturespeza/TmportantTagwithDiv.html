<!DOCTYPE html>
<html lang="en">
<head>
    <title>Important Tag with div</title>
</head>
<body>
    <div>
        <b>This is bold</b>
    </div>
    <div>
        <strong>This text become strong</strong>
    </div>
    <div>
        <i>This makes the text italic</i>
    </div>
    <div>
        <em>This is similar to italic</em>
    </div>
    <div>
        <small>This text loos small</small>
    </div>
    <div>
        <del>This text is deleted</del>
    </div>
    <div>
        <p>CO<sub>2</sub></p>
    </div>
    <div>
        <p>H<sup>2</sup></p>
    </div>
</body>
</html>
