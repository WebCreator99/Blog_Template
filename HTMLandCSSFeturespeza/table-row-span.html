<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>Table row span</title>
</head>
<body>
    <table border="1">
        <tr>
            <th>Department</th>
            <th>Name</th>
        </tr>
        <tr>
            <td>Department</td>
            <td>Name</td>
        </tr> 
            <td rowspan="2">Engineering</td>
            <td>Sacheendra</td>
        </tr>
        <tr>
            <td>jOY</td>
        </tr>

        <tr>
            <td rowspan="2">Sales</td>
            <td>Chandan</td>
        </tr>
        <tr>
            <td>Sharma</td>
        </tr>

    </table>
</body>
</html>
